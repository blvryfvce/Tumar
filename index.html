<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUMAR Group — Цветовая палитра</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #191919;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 680px;
    width: 100%;
  }
  @media (max-width: 500px) {
    .grid { grid-template-columns: 1fr; }
    body { align-items: flex-start; padding: 16px; }
  }
  .card {
    background: #2f2f2f;
    border-radius: 10px;
    overflow: hidden;
  }
  .swatch { height: 110px; border-radius: 10px 10px 0 0; }
  .swatch-white { border-bottom: 1px solid #3d3d3d; }
  .info { padding: 12px 14px; }
  .name { font-size: 12px; font-weight: 600; color: #e3e3e3; margin-bottom: 10px; letter-spacing: 0.01em; }
  .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .code { font-size: 11px; font-family: 'SF Mono', 'Fira Code', monospace; color: #888; }
  .copy-btn {
    font-size: 10px; padding: 2px 7px;
    border: 1px solid #444; border-radius: 4px;
    background: #383838; cursor: pointer; color: #aaa;
    font-family: 'Inter', sans-serif;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0; margin-left: 6px; white-space: nowrap;
  }
  .copy-btn:hover { background: #444; color: #e0e0e0; }
  .copy-btn.copied { background: #1e3a2a; border-color: #2d6a4f; color: #6fcf97; }
</style>
</head>
<body>
<div class="grid">

  <div class="card">
    <div class="swatch" style="background:#51061A"></div>
    <div class="info">
      <p class="name">Бордо</p>
      <div class="row"><span class="code">HEX #51061A</span><button class="copy-btn" onclick="copy(this,'#51061A')">копировать</button></div>
      <div class="row"><span class="code">RGB 81, 6, 26</span><button class="copy-btn" onclick="copy(this,'rgb(81, 6, 26)')">копировать</button></div>
      <div class="row"><span class="code">CMYK 40, 91, 62, 67</span><button class="copy-btn" onclick="copy(this,'40, 91, 62, 67')">копировать</button></div>
    </div>
  </div>

  <div class="card">
    <div class="swatch" style="background:#1C1F3C"></div>
    <div class="info">
      <p class="name">Тёмно-синий</p>
      <div class="row"><span class="code">HEX #1C1F3C</span><button class="copy-btn" onclick="copy(this,'#1C1F3C')">копировать</button></div>
      <div class="row"><span class="code">RGB 28, 31, 60</span><button class="copy-btn" onclick="copy(this,'rgb(28, 31, 60)')">копировать</button></div>
      <div class="row"><span class="code">CMYK 99, 91, 43, 54</span><button class="copy-btn" onclick="copy(this,'99, 91, 43, 54')">копировать</button></div>
    </div>
  </div>

  <div class="card">
    <div class="swatch swatch-white" style="background:#FFFFFF"></div>
    <div class="info">
      <p class="name">Белый</p>
      <div class="row"><span class="code">HEX #FFFFFF</span><button class="copy-btn" onclick="copy(this,'#FFFFFF')">копировать</button></div>
      <div class="row"><span class="code">RGB 255, 255, 255</span><button class="copy-btn" onclick="copy(this,'rgb(255, 255, 255)')">копировать</button></div>
      <div class="row"><span class="code">CMYK 0, 0, 0, 0</span><button class="copy-btn" onclick="copy(this,'0, 0, 0, 0')">копировать</button></div>
    </div>
  </div>

</div>
<script>
function copy(btn, text) {
  navigator.clipboard.writeText(text);
  btn.textContent = '✓ готово';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'копировать'; btn.classList.remove('copied'); }, 2000);
}
</script>
</body>
</html>
