<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:1rem 0">

  <div style="border-radius:var(--border-radius-lg);overflow:hidden;border:0.5px solid var(--color-border-tertiary)">
    <div style="background:#51061A;height:120px"></div>
    <div style="padding:14px 16px;background:var(--color-background-primary)">
      <p style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin:0 0 8px">Бордо</p>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono)">HEX #51061A</span>
        <button onclick="navigator.clipboard.writeText('#51061A')" style="font-size:11px;padding:2px 8px;cursor:pointer;border-radius:4px">#</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono)">RGB 81, 6, 26</span>
        <button onclick="navigator.clipboard.writeText('rgb(81, 6, 26)')" style="font-size:11px;padding:2px 8px;cursor:pointer;border-radius:4px">#</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono)">CMYK 40, 91, 62, 67</span>
        <button onclick="navigator.clipboard.writeText('40, 91, 62, 67')" style="font-size:11px;padding:2px 8px;cursor:pointer;border-radius:4px">#</button>
      </div>
    </div>
  </div>

  <div style="border-radius:var(--border-radius-lg);overflow:hidden;border:0.5px solid var(--color-border-tertiary)">
    <div style="background:#1C1F3C;height:120px"></div>
    <div style="padding:14px 16px;background:var(--color-background-primary)">
      <p style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin:0 0 8px">Тёмно-синий</p>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono)">HEX #1C1F3C</span>
        <button onclick="navigator.clipboard.writeText('#1C1F3C')" style="font-size:11px;padding:2px 8px;cursor:pointer;border-radius:4px">#</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono)">RGB 28, 31, 60</span>
        <button onclick="navigator.clipboard.writeText('rgb(28, 31, 60)')" style="font-size:11px;padding:2px 8px;cursor:pointer;border-radius:4px">#</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono)">CMYK 99, 91, 43, 54</span>
        <button onclick="navigator.clipboard.writeText('99, 91, 43, 54')" style="font-size:11px;padding:2px 8px;cursor:pointer;border-radius:4px">#</button>
      </div>
    </div>
  </div>

  <div style="border-radius:var(--border-radius-lg);overflow:hidden;border:0.5px solid var(--color-border-tertiary)">
    <div style="background:#ffffff;height:120px;border-bottom:0.5px solid var(--color-border-tertiary)"></div>
    <div style="padding:14px 16px;background:var(--color-background-primary)">
      <p style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin:0 0 8px">Белый</p>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono)">HEX #FFFFFF</span>
        <button onclick="navigator.clipboard.writeText('#FFFFFF')" style="font-size:11px;padding:2px 8px;cursor:pointer;border-radius:4px">#</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono)">RGB 255, 255, 255</span>
        <button onclick="navigator.clipboard.writeText('rgb(255, 255, 255)')" style="font-size:11px;padding:2px 8px;cursor:pointer;border-radius:4px">#</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono)">CMYK 0, 0, 0, 0</span>
        <button onclick="navigator.clipboard.writeText('0, 0, 0, 0')" style="font-size:11px;padding:2px 8px;cursor:pointer;border-radius:4px">#</button>
      </div>
    </div>
  </div>

</div>
